{% extends "base.html" %}
{% block title %}{{ page.title }} · {{ site.title }}{% endblock %}
{% block description %}{{ page.summary or t.tagline }}{% endblock %}
{% block og_title %}{{ page.title }}{% endblock %}
{% block content %}
<article class="post">
  <header class="post-header">
    <h1>{{ page.title }}</h1>
  </header>
  <div class="prose">
    {{ page.html | safe }}
  </div>
</article>
{% endblock %}
